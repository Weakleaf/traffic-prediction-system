<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Prediction Dashboard - CYBER TITANS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; text-align: center; }
        .header h1 { color: #11998e; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.1em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card h2 { color: #11998e; margin-bottom: 20px; font-size: 1.5em; }
        .stat-box { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .stat-box h3 { font-size: 2em; margin-bottom: 5px; }
        .congestion-low { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .congestion-moderate { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .congestion-high { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .congestion-severe { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .forecast-item { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .forecast-time { font-weight: bold; color: #11998e; }
        .forecast-value { font-size: 1.2em; font-weight: bold; }
        .badge { padding: 5px 15px; border-radius: 20px; color: white; font-size: 0.9em; font-weight: bold; }
        .badge-low { background: #38ef7d; }
        .badge-moderate { background: #f5576c; }
        .badge-high { background: #fee140; color: #333; }
        .badge-severe { background: #f45c43; }
        button { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1.1em; cursor: pointer; width: 100%; margin-top: 10px; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .loading { text-align: center; padding: 20px; color: #11998e; }
        .error { background: #f45c43; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .footer { text-align: center; color: white; margin-top: 30px; padding: 20px; }
        select, input[type="number"] { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; margin-bottom: 15px; background: white; }
        select:focus, input[type="number"]:focus { outline: none; border-color: #11998e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚦 Traffic Prediction Dashboard</h1>
            <p>Real-time Traffic Congestion Prediction using CNN-LSTM</p>
            <p style="margin-top:10px;font-size:0.9em;"><strong>CYBER TITANS</strong> - Kisii University 2026</p>
        </div>
        <div class="grid">
            <div class="card">
                <h2>📊 Current Status</h2>
                <div id="currentStatus"><div class="loading">Loading...</div></div>
                <button onclick="refreshCurrent()">🔄 Refresh</button>
            </div>
            <div class="card">
                <h2>📈 Statistics</h2>
                <div id="statistics"><div class="loading">Loading...</div></div>
            </div>
            <div class="card">
                <h2>🔮 Get Forecast</h2>
                <label for="roadSelect">Select Road:</label>
                <select id="roadSelect" onchange="refreshCurrent()">
                    <option value="">All Roads</option>
                </select>
                <label for="hoursAhead">Hours Ahead:</label>
                <input type="number" id="hoursAhead" value="6" min="1" max
